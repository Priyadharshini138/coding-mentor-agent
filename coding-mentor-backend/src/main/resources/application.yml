spring:
  application:
    name: coding-mentor-backend

  datasource:
    url: ${DB_URL:jdbc:h2:mem:codingmentor;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration


server:
  port: ${PORT:8080}
  forward-headers-strategy: framework


app:
  jwt-secret: ${JWT_SECRET:change_this_secret}
  gemini-api-key: ${GEMINI_API_KEY:your_gemini_key}
  frontend-origin: ${FRONTEND_ORIGIN:http://localhost:5173}


logging:
  level:
    root: INFO
    org.springframework.web: INFO