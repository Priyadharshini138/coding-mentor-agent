spring:
  application:
    name: coding-mentor-backend

server:
  port: ${PORT:8080}

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/coding_mentor}
    username: ${DB_USERNAME:mentor_user}
    password: ${DB_PASSWORD:mentor_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt-secret: ${JWT_SECRET:change_this_secret}
  gemini-api-key: ${GEMINI_API_KEY:your_gemini_key}
  frontend-origin: ${FRONTEND_ORIGIN:http://localhost:5173}

logging:
  level:
    root: INFO
    org.springframework.web: INFO
